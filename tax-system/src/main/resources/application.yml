spring:
  application:
    name: tax-system
  datasource:
    url: jdbc:h2:mem:taxsystem;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    com.example.taxsystem: INFO

taxsystem:
  security:
    reader-user: reader
    reader-password: reader-secret
    writer-user: writer
    writer-password: writer-secret
  stress:
    default-timeout-millis: 2000
    max-concurrency: 32
  samples:
    properties-location: classpath:sample-taxsystem.properties

resilience4j:
  retry:
    instances:
      stressHttpClient:
        max-attempts: 2
        wait-duration: 150ms
        retry-exceptions:
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException
          - org.springframework.web.client.HttpServerErrorException
