<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DontPad Clone</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; color: #222; }
        .box { max-width: 720px; }
        a { color: #0a66c2; text-decoration: none; }
        a:hover { text-decoration: underline; }
        code { background: #f3f3f3; padding: 2px 6px; }
    </style>
</head>
<body>
<div class="box">
    <h1>DontPad Clone</h1>
    <p>Abra um pad pelo link no formato <code>/pads/{slug}</code>.</p>
    <p>Exemplo: <a th:href="@{'/pads/' + ${exampleSlug}}" th:text="${'/pads/' + exampleSlug}"></a></p>
    <p>A API REST fica em <code>/api/pads/{slug}</code>.</p>
</div>
</body>
</html>
