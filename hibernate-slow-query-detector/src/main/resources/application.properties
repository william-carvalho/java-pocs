server.port=8080
spring.datasource.url=jdbc:h2:mem:slowquerydb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.properties.hibernate.session_factory.statement_inspector=com.example.hibernateslowquerydetector.detector.QueryStatementInspector
app.slow-query.threshold-ms=200
